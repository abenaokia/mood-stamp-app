<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>気分スタンプ帳</title>
<style>
  :root{
    --gold-1:#ffe484;
    --gold-2:#f6b93b;
    --gold-3:#c9860f;
    --gray-1:#eef0f3;
    --gray-2:#aab2bd;
    --gray-3:#6b7280;
    --bg:#faf7f0;
    --card:#ffffff;
    --ink:#2b2b2b;
    --sub:#8a8478;
    --accent:#e4572e;
    --line:#ece7db;
    --radius:20px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
    background:#e9e4d8;
    color:var(--ink);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .phone{
    width:100%;
    max-width:430px;
    min-height:100vh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    position:relative;
    box-shadow:0 0 40px rgba(0,0,0,0.15);
    overflow:hidden;
  }
  header.topbar{
    padding:18px 20px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  header.topbar h1{
    font-size:18px;
    margin:0;
    font-weight:700;
    letter-spacing:.02em;
  }
  header.topbar .date{
    font-size:12px;
    color:var(--sub);
  }
  main{
    flex:1;
    overflow-y:auto;
    padding:4px 20px 100px;
  }
  .screen{display:none;}
  .screen.active{display:block;}

  /* ---- Home ---- */
  .streak-banner{
    background:linear-gradient(135deg,#2b2b2b,#4a4a4a);
    color:#fff;
    border-radius:var(--radius);
    padding:16px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
  }
  .streak-banner .num{font-size:26px;font-weight:800;}
  .streak-banner .label{font-size:11px;opacity:.8;}
  .streak-banner .flame{font-size:22px;}

  .add-card{
    background:var(--card);
    border-radius:var(--radius);
    padding:24px 20px 20px;
    text-align:center;
    border:1px solid var(--line);
  }
  .add-card h2{
    font-size:15px;
    margin:0 0 18px;
    color:var(--sub);
    font-weight:500;
  }
  .stamp-choices{
    display:flex;
    gap:14px;
    justify-content:center;
  }
  .stamp-btn{
    flex:1;
    border:none;
    background:none;
    cursor:pointer;
    padding:8px 6px 4px;
    border-radius:16px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    transition:transform .15s ease;
  }
  .date-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:18px;
  }
  .date-row input[type="date"]{
    padding:8px 10px;
    border:1px solid var(--line);
    border-radius:10px;
    font-size:13px;
    background:var(--bg);
    color:var(--ink);
    font-family:inherit;
  }
  .stamp-btn:active{transform:scale(0.9);}
  .stamp-circle{
    width:84px;
    height:84px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    position:relative;
  }
  .stamp-circle::after{
    content:"";
    position:absolute;
    inset:6px;
    border-radius:50%;
    border:2px dashed rgba(255,255,255,0.55);
  }
  .stamp-circle.gold{
    background:radial-gradient(circle at 32% 28%, var(--gold-1), var(--gold-2) 55%, var(--gold-3) 100%);
    box-shadow:0 6px 14px rgba(201,134,15,0.35);
  }
  .stamp-circle.gray{
    background:radial-gradient(circle at 32% 28%, #fdfdfd, var(--gray-2) 60%, var(--gray-3) 100%);
    box-shadow:0 6px 14px rgba(107,114,128,0.3);
  }
  .stamp-btn span.label{
    font-size:13px;
    font-weight:600;
    color:var(--ink);
  }
  .stamp-btn small{
    font-size:10.5px;
    color:var(--sub);
  }

  .section-title{
    font-size:13px;
    font-weight:700;
    color:var(--sub);
    margin:24px 0 10px;
    letter-spacing:.04em;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }

  .today-strip{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    min-height:44px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:12px;
  }
  .strip-stamp{
    width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;flex-shrink:0;
  }
  .strip-stamp.gold{background:linear-gradient(135deg,var(--gold-1),var(--gold-2));}
  .strip-stamp.gray{background:linear-gradient(135deg,#e5e7eb,var(--gray-2));}
  @keyframes popIn{
    0%{transform:scale(0);opacity:0;}
    60%{transform:scale(1.2);opacity:1;}
    100%{transform:scale(1);}
  }
  .strip-stamp:last-child{animation:popIn .3s ease;}

  .undo-row{text-align:center;margin-top:12px;}
  .link-btn{
    background:none;
    border:none;
    color:var(--accent);
    font-size:12.5px;
    text-decoration:underline;
    cursor:pointer;
  }
  .empty-note{
    color:var(--sub);
    font-size:12px;
    padding:8px 4px;
  }

  /* ---- Collection book ---- */
  .book-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin:6px 0 16px;
  }
  .book-header .book-title{font-size:15px;font-weight:700;}
  .book-header .book-sub{font-size:11px;color:var(--sub);}
  .book-nav{display:flex;align-items:center;gap:8px;}
  .book-nav button{
    border:1px solid var(--line);background:var(--card);width:32px;height:32px;border-radius:9px;
    font-size:15px;cursor:pointer;
  }
  .book-nav button:disabled{opacity:.3;cursor:default;}
  .book-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
  }
  .book-slot{
    aspect-ratio:1;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
  }
  .book-slot.gold{background:radial-gradient(circle at 32% 28%, var(--gold-1), var(--gold-2) 55%, var(--gold-3) 100%);}
  .book-slot.gray{background:radial-gradient(circle at 32% 28%, #fdfdfd, var(--gray-2) 60%, var(--gray-3) 100%);}
  .book-slot.empty{background:transparent;border:2px dashed var(--line);}

  /* ---- Calendar ---- */
  .cal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin:6px 0 14px;
  }
  .cal-header button{
    border:none;background:var(--card);width:34px;height:34px;border-radius:10px;
    font-size:16px;cursor:pointer;border:1px solid var(--line);
  }
  .cal-header .month-label{font-size:15px;font-weight:700;}
  .weekday-row{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    margin-bottom:6px;
  }
  .weekday-row div{
    text-align:center;
    font-size:11px;
    color:var(--sub);
    font-weight:600;
  }
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
  }
  .cal-cell{
    aspect-ratio:1;
    border-radius:12px;
    background:var(--card);
    border:1px solid var(--line);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    font-size:11px;
    color:var(--ink);
    cursor:pointer;
    position:relative;
  }
  .cal-cell.empty{background:transparent;border:none;cursor:default;}
  .cal-cell .daynum{font-size:10.5px;color:var(--sub);}
  .cal-cell.future{opacity:.35;cursor:default;}
  .cal-cell.today{box-shadow:0 0 0 2px var(--accent) inset;}
  .cal-badges{display:flex;gap:3px;justify-content:center;margin-top:2px;flex-wrap:wrap;}
  .badge{
    font-size:9px;font-weight:700;color:#fff;border-radius:8px;padding:1px 5px;min-width:14px;line-height:1.4;
  }
  .badge.gold{background:linear-gradient(135deg,var(--gold-2),var(--gold-3));}
  .badge.gray{background:linear-gradient(135deg,var(--gray-2),var(--gray-3));}

  .legend{
    display:flex;gap:16px;margin-top:16px;font-size:11.5px;color:var(--sub);align-items:center;
  }
  .legend .dot-sm{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:-1px;}
  .dot-sm.gold{background:linear-gradient(135deg,var(--gold-1),var(--gold-2));}
  .dot-sm.gray{background:linear-gradient(135deg,#e5e7eb,var(--gray-2));}

  /* ---- Stats ---- */
  .stats-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:20px;
  }
  .stat-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:16px;
    text-align:center;
  }
  .stat-card .val{font-size:24px;font-weight:800;}
  .stat-card .cap{font-size:11px;color:var(--sub);margin-top:2px;}

  .donut-wrap{
    display:flex;
    align-items:center;
    gap:20px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px;
  }
  .donut{
    width:110px;height:110px;border-radius:50%;
    flex-shrink:0;
  }
  .donut-legend div{font-size:12.5px;margin-bottom:8px;}
  .donut-legend .n{font-weight:700;}

  .data-actions{display:flex;flex-direction:column;gap:10px;margin-bottom:10px;}
  .data-btn{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    font-size:13px;
    font-weight:600;
    color:var(--ink);
    cursor:pointer;
    text-align:center;
  }

  /* ---- Bottom nav ---- */
  nav.bottomnav{
    position:absolute;
    left:0;right:0;bottom:0;
    background:var(--card);
    border-top:1px solid var(--line);
    display:flex;
    padding:10px 6px calc(10px + env(safe-area-inset-bottom));
    z-index:10;
  }
  nav.bottomnav button{
    flex:1;
    background:none;
    border:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
    font-size:10px;
    color:var(--sub);
    cursor:pointer;
    padding:4px 0;
  }
  nav.bottomnav button .icon{font-size:18px;}
  nav.bottomnav button.active{color:var(--accent);font-weight:700;}

  /* ---- Modal ---- */
  .modal-overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
    display:flex;
    align-items:flex-end;
    justify-content:center;
    z-index:40;
  }
  .modal-overlay.hidden{display:none;}
  .modal-panel{
    background:#fff;
    width:100%;
    max-height:78%;
    border-radius:22px 22px 0 0;
    padding:20px 20px calc(20px + env(safe-area-inset-bottom));
    overflow-y:auto;
  }
  .modal-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .modal-head h3{font-size:16px;margin:0;}
  .modal-head button{border:none;background:var(--gray-1);width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;}
  .modal-counts{display:flex;gap:10px;margin-bottom:16px;}
  .modal-counts .chip{
    flex:1;text-align:center;padding:10px;border-radius:12px;font-size:13px;font-weight:700;color:#fff;
  }
  .modal-counts .chip.gold{background:linear-gradient(135deg,var(--gold-2),var(--gold-3));}
  .modal-counts .chip.gray{background:linear-gradient(135deg,var(--gray-2),var(--gray-3));}
  .modal-add{display:flex;gap:10px;margin-bottom:16px;}
  .modal-add button{
    flex:1;border:1px dashed var(--line);background:var(--bg);border-radius:12px;padding:10px;font-size:12.5px;cursor:pointer;color:var(--ink);
  }
  .modal-list{display:flex;flex-direction:column;gap:8px;}
  .modal-item{
    display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:10px;padding:8px 10px;font-size:12.5px;
  }
  .modal-item .dot-sm{flex-shrink:0;}
  .modal-item .t{flex:1;color:var(--sub);}
  .modal-item button{border:none;background:none;color:var(--accent);font-size:14px;cursor:pointer;}
</style>
</head>
<body>
<div class="phone">
  <header class="topbar">
    <h1>気分スタンプ帳</h1>
    <div class="date" id="topDate"></div>
  </header>

  <main>
    <!-- HOME -->
    <section class="screen active" id="screen-home">
      <div class="streak-banner">
        <div>
          <div class="num" id="streakNum">0<span style="font-size:14px;">日</span></div>
          <div class="label">連続記録</div>
        </div>
        <div class="flame">🔥</div>
      </div>

      <div class="add-card">
        <h2>スタンプを集める</h2>
        <div class="date-row">
          <input type="date" id="addDate">
          <button type="button" class="link-btn" id="resetToday">今日に戻す</button>
        </div>
        <div class="stamp-choices">
          <button class="stamp-btn" data-type="gold">
            <div class="stamp-circle gold">😊</div>
            <small>金色スタンプ</small>
          </button>
          <button class="stamp-btn" data-type="gray">
            <div class="stamp-circle gray">😐</div>
            <small>灰色スタンプ</small>
          </button>
        </div>
      </div>

      <div class="section-title" id="homeStripTitle"></div>
      <div class="today-strip" id="todayStrip"></div>
      <div class="undo-row"><button class="link-btn" id="undoBtn">直前のスタンプを取り消す</button></div>
    </section>

    <!-- COLLECTION BOOK -->
    <section class="screen" id="screen-book">
      <div class="book-header">
        <div>
          <div class="book-title">スタンプ帳</div>
          <div class="book-sub" id="bookSub"></div>
        </div>
        <div class="book-nav">
          <button id="bookPrev">‹</button>
          <span id="bookPageLabel" style="font-size:12px;color:var(--sub);"></span>
          <button id="bookNext">›</button>
        </div>
      </div>
      <div class="book-grid" id="bookGrid"></div>
    </section>

    <!-- CALENDAR -->
    <section class="screen" id="screen-calendar">
      <div class="cal-header">
        <button id="prevMonth">‹</button>
        <div class="month-label" id="monthLabel"></div>
        <button id="nextMonth">›</button>
      </div>
      <div class="weekday-row">
        <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="legend">
        <span><span class="dot-sm gold"></span>金スタンプ</span>
        <span><span class="dot-sm gray"></span>灰スタンプ</span>
      </div>
    </section>

    <!-- STATS -->
    <section class="screen" id="screen-stats">
      <div class="section-title" style="margin-top:6px;"><span>サマリー</span></div>
      <div class="stats-grid">
        <div class="stat-card"><div class="val" id="statTotal">0</div><div class="cap">総スタンプ数</div></div>
        <div class="stat-card"><div class="val" id="statDays">0</div><div class="cap">記録日数</div></div>
        <div class="stat-card"><div class="val" id="statGold">0</div><div class="cap">金色スタンプ</div></div>
        <div class="stat-card"><div class="val" id="statGray">0</div><div class="cap">灰色スタンプ</div></div>
        <div class="stat-card"><div class="val" id="statLongest">0</div><div class="cap">最長連続記録</div></div>
        <div class="stat-card"><div class="val" id="statAvg">0</div><div class="cap">1日の平均</div></div>
      </div>

      <div class="section-title"><span>割合</span></div>
      <div class="donut-wrap">
        <div class="donut" id="donut"></div>
        <div class="donut-legend">
          <div><span class="dot-sm gold"></span>金スタンプ <span class="n" id="goldPct">0%</span></div>
          <div><span class="dot-sm gray"></span>灰スタンプ <span class="n" id="grayPct">0%</span></div>
        </div>
      </div>

      <div class="section-title"><span>データ管理</span></div>
      <div class="data-actions">
        <button type="button" class="data-btn" id="exportBtn">📤 書き出す（バックアップ）</button>
        <button type="button" class="data-btn" id="importBtn">📥 読み込む（他の端末から合体）</button>
        <input type="file" id="importFile" accept="application/json" style="display:none;">
      </div>
      <div class="empty-note">他の端末のデータと一緒にしたいときは、それぞれの端末で「書き出す」→ファイルを送る→もう一方の端末で「読み込む」。重複しないように合体されます。</div>
    </section>
  </main>

  <nav class="bottomnav">
    <button class="nav-btn active" data-screen="home"><span class="icon">🏠</span>ホーム</button>
    <button class="nav-btn" data-screen="book"><span class="icon">📖</span>スタンプ帳</button>
    <button class="nav-btn" data-screen="calendar"><span class="icon">📅</span>カレンダー</button>
    <button class="nav-btn" data-screen="stats"><span class="icon">📊</span>統計</button>
  </nav>

  <div class="modal-overlay hidden" id="dayModal">
    <div class="modal-panel">
      <div class="modal-head">
        <h3 id="modalTitle"></h3>
        <button id="modalClose">✕</button>
      </div>
      <div class="modal-counts">
        <div class="chip gold" id="modalGoldChip">金 0</div>
        <div class="chip gray" id="modalGrayChip">灰 0</div>
      </div>
      <div class="modal-add">
        <button id="modalAddGold">＋ 金スタンプを追加</button>
        <button id="modalAddGray">＋ 灰スタンプを追加</button>
      </div>
      <div class="modal-list" id="modalList"></div>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var STORAGE_KEY = "moodStampApp_v2";
  var OLD_STORAGE_KEY = "moodStampApp_v1";
  var MONTHS_JA = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  var PAGE_SIZE = 30;

  var state = {
    stamps: [],          // [{id, type:"gold"|"gray", ts:number}]
    calYear: null,
    calMonth: null,
    bookPage: null,       // 1-based
    modalDate: null,
    selectedDate: null     // date currently targeted by the home add buttons
  };

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  function loadData(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        var parsed = JSON.parse(raw);
        state.stamps = parsed.stamps || [];
        return;
      }
      // migrate from old one-stamp-per-day version if present
      var oldRaw = localStorage.getItem(OLD_STORAGE_KEY);
      if(oldRaw){
        var oldParsed = JSON.parse(oldRaw);
        var records = oldParsed.records || {};
        var migrated = [];
        Object.keys(records).forEach(function(key){
          var d = parseKey(key);
          d.setHours(12,0,0,0);
          migrated.push({id: uid(), type: records[key], ts: d.getTime()});
        });
        state.stamps = migrated;
        saveData();
      }
    }catch(e){
      state.stamps = [];
    }
  }

  function saveData(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify({stamps: state.stamps}));
    }catch(e){ /* storage unavailable, ignore */ }
  }

  function pad2(n){ return n < 10 ? "0"+n : ""+n; }
  function fmtDate(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
  function todayKey(){ return fmtDate(new Date()); }
  function parseKey(key){
    var parts = key.split("-").map(Number);
    return new Date(parts[0], parts[1]-1, parts[2]);
  }
  function dateKeyOf(ts){ return fmtDate(new Date(ts)); }
  function fmtTime(ts){
    var d = new Date(ts);
    return pad2(d.getHours())+":"+pad2(d.getMinutes());
  }

  function addStamp(type, dateKey){
    var ts;
    if(dateKey && dateKey !== todayKey()){
      var base = parseKey(dateKey);
      var existing = state.stamps.filter(function(s){ return dateKeyOf(s.ts) === dateKey; }).length;
      base.setHours(12,0,existing,0);
      ts = base.getTime();
    } else {
      ts = Date.now();
    }
    state.stamps.push({id: uid(), type: type, ts: ts});
    saveData();
    renderAll();
  }

  function removeStamp(id){
    state.stamps = state.stamps.filter(function(s){ return s.id !== id; });
    saveData();
    renderAll();
  }

  function undoLast(){
    var items = state.stamps.filter(function(s){ return dateKeyOf(s.ts) === state.selectedDate; });
    if(items.length === 0) return;
    var last = items.reduce(function(a,b){ return a.ts > b.ts ? a : b; });
    removeStamp(last.id);
  }

  function groupByDay(){
    var map = {};
    state.stamps.forEach(function(s){
      var key = dateKeyOf(s.ts);
      if(!map[key]) map[key] = {gold:0, gray:0, items:[]};
      map[key][s.type]++;
      map[key].items.push(s);
    });
    Object.keys(map).forEach(function(k){
      map[k].items.sort(function(a,b){ return a.ts - b.ts; });
    });
    return map;
  }

  // ---- streak calculation ----
  function currentStreak(dayMap){
    var streak = 0;
    var cursor = new Date();
    if(!dayMap[fmtDate(cursor)]){
      cursor.setDate(cursor.getDate()-1);
    }
    while(dayMap[fmtDate(cursor)]){
      streak++;
      cursor.setDate(cursor.getDate()-1);
    }
    return streak;
  }

  function longestStreak(dayMap){
    var keys = Object.keys(dayMap).sort();
    if(keys.length === 0) return 0;
    var longest = 1, run = 1;
    for(var i=1;i<keys.length;i++){
      var prev = parseKey(keys[i-1]);
      var cur = parseKey(keys[i]);
      var diffDays = Math.round((cur - prev) / 86400000);
      if(diffDays === 1){ run++; }
      else if(diffDays !== 0){ run = 1; }
      if(run > longest) longest = run;
    }
    return longest;
  }

  // ---- rendering ----
  function renderTopDate(){
    var now = new Date();
    var opts = {month:"long", day:"numeric", weekday:"short"};
    document.getElementById("topDate").textContent = now.toLocaleDateString("ja-JP", opts);
  }

  function renderHome(dayMap){
    document.getElementById("streakNum").innerHTML = currentStreak(dayMap) + '<span style="font-size:14px;">日</span>';

    var selKey = state.selectedDate || todayKey();
    var isToday = selKey === todayKey();
    var selItems = (dayMap[selKey] ? dayMap[selKey].items : []);

    var dLabel;
    if(isToday){
      dLabel = "今日";
    } else {
      var d = parseKey(selKey);
      dLabel = (d.getMonth()+1) + "月" + d.getDate() + "日";
    }
    document.getElementById("homeStripTitle").innerHTML =
      '<span>' + dLabel + 'のスタンプ（<span id="todayCount">' + selItems.length + '</span>）</span>';

    var strip = document.getElementById("todayStrip");
    strip.innerHTML = "";
    if(selItems.length === 0){
      strip.innerHTML = '<div class="empty-note">まだ' + dLabel + 'のスタンプはありません。上のボタンでスタンプを集めましょう。</div>';
    } else {
      selItems.forEach(function(item){
        var el = document.createElement("div");
        el.className = "strip-stamp " + item.type;
        el.textContent = item.type === "gold" ? "😊" : "😐";
        el.title = fmtTime(item.ts);
        strip.appendChild(el);
      });
    }
  }

  function renderBook(){
    var chrono = state.stamps.slice().sort(function(a,b){ return a.ts - b.ts; });
    var total = chrono.length;
    var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if(!state.bookPage || state.bookPage > totalPages) state.bookPage = totalPages;
    if(state.bookPage < 1) state.bookPage = 1;

    document.getElementById("bookSub").textContent = "全 " + total + " 個 / 1ページ " + PAGE_SIZE + "個";
    document.getElementById("bookPageLabel").textContent = state.bookPage + " / " + totalPages;
    document.getElementById("bookPrev").disabled = state.bookPage <= 1;
    document.getElementById("bookNext").disabled = state.bookPage >= totalPages;

    var startIdx = (state.bookPage - 1) * PAGE_SIZE;
    var pageItems = chrono.slice(startIdx, startIdx + PAGE_SIZE);

    var grid = document.getElementById("bookGrid");
    grid.innerHTML = "";
    for(var i=0;i<PAGE_SIZE;i++){
      var slot = document.createElement("div");
      if(pageItems[i]){
        slot.className = "book-slot " + pageItems[i].type;
        slot.textContent = pageItems[i].type === "gold" ? "😊" : "😐";
      } else {
        slot.className = "book-slot empty";
      }
      grid.appendChild(slot);
    }
  }

  function renderCalendar(dayMap){
    var label = MONTHS_JA[state.calMonth] + " " + state.calYear;
    document.getElementById("monthLabel").textContent = label;

    var grid = document.getElementById("calGrid");
    grid.innerHTML = "";

    var firstDay = new Date(state.calYear, state.calMonth, 1);
    var startOffset = firstDay.getDay();
    var daysInMonth = new Date(state.calYear, state.calMonth+1, 0).getDate();
    var tKey = todayKey();

    for(var i=0;i<startOffset;i++){
      var empty = document.createElement("div");
      empty.className = "cal-cell empty";
      grid.appendChild(empty);
    }

    for(var day=1; day<=daysInMonth; day++){
      var dateObj = new Date(state.calYear, state.calMonth, day);
      var key = fmtDate(dateObj);
      var info = dayMap[key];
      var isFuture = dateObj > new Date(new Date().toDateString());
      var cell = document.createElement("div");
      cell.className = "cal-cell" + (isFuture ? " future" : "") + (key===tKey ? " today" : "");
      var badges = "";
      if(info){
        if(info.gold > 0) badges += '<span class="badge gold">'+info.gold+'</span>';
        if(info.gray > 0) badges += '<span class="badge gray">'+info.gray+'</span>';
      }
      cell.innerHTML = '<div class="daynum">'+day+'</div><div class="cal-badges">'+badges+'</div>';
      if(!isFuture){
        cell.addEventListener("click", function(k){
          return function(){ openDayModal(k); };
        }(key));
      }
      grid.appendChild(cell);
    }
  }

  function openDayModal(key){
    state.modalDate = key;
    renderModal();
    document.getElementById("dayModal").classList.remove("hidden");
  }

  function closeModal(){
    document.getElementById("dayModal").classList.add("hidden");
    state.modalDate = null;
  }

  function renderModal(){
    if(!state.modalDate) return;
    var key = state.modalDate;
    var d = parseKey(key);
    document.getElementById("modalTitle").textContent = (d.getMonth()+1) + "月" + d.getDate() + "日";

    var items = state.stamps.filter(function(s){ return dateKeyOf(s.ts) === key; })
                             .sort(function(a,b){ return a.ts - b.ts; });
    var gold = items.filter(function(s){ return s.type === "gold"; }).length;
    var gray = items.length - gold;
    document.getElementById("modalGoldChip").textContent = "金 " + gold;
    document.getElementById("modalGrayChip").textContent = "灰 " + gray;

    var list = document.getElementById("modalList");
    list.innerHTML = "";
    if(items.length === 0){
      list.innerHTML = '<div class="empty-note">この日のスタンプはまだありません。</div>';
    } else {
      items.forEach(function(item){
        var row = document.createElement("div");
        row.className = "modal-item";
        row.innerHTML =
          '<span class="dot-sm ' + item.type + '"></span>' +
          '<span class="t">' + (item.type === "gold" ? "金スタンプ" : "灰スタンプ") + ' ・ ' + fmtTime(item.ts) + '</span>' +
          '<button data-id="' + item.id + '">✕</button>';
        list.appendChild(row);
      });
      list.querySelectorAll("button[data-id]").forEach(function(btn){
        btn.addEventListener("click", function(){
          removeStamp(btn.getAttribute("data-id"));
          renderModal();
        });
      });
    }
  }

  function renderStats(dayMap){
    var total = state.stamps.length;
    var gold = state.stamps.filter(function(s){ return s.type === "gold"; }).length;
    var gray = total - gold;
    var activeDays = Object.keys(dayMap).length;

    document.getElementById("statTotal").textContent = total;
    document.getElementById("statDays").textContent = activeDays;
    document.getElementById("statGold").textContent = gold;
    document.getElementById("statGray").textContent = gray;
    document.getElementById("statLongest").textContent = longestStreak(dayMap);
    document.getElementById("statAvg").textContent = activeDays ? (total/activeDays).toFixed(1) : "0";

    var goldPct = total ? Math.round((gold/total)*100) : 0;
    var grayPct = total ? 100 - goldPct : 0;
    document.getElementById("goldPct").textContent = goldPct + "%";
    document.getElementById("grayPct").textContent = grayPct + "%";

    var donut = document.getElementById("donut");
    if(total === 0){
      donut.style.background = "conic-gradient(#e5e7eb 0deg 360deg)";
    } else {
      var goldDeg = (gold/total)*360;
      donut.style.background = "conic-gradient(#f6b93b 0deg " + goldDeg + "deg, #aab2bd " + goldDeg + "deg 360deg)";
    }
  }

  function exportData(){
    var payload = JSON.stringify({stamps: state.stamps, exportedAt: Date.now()}, null, 2);
    var filename = "mood-stamp-backup-" + todayKey() + ".json";
    var blob = new Blob([payload], {type: "application/json"});

    if(navigator.canShare){
      try{
        var file = new File([blob], filename, {type:"application/json"});
        if(navigator.canShare({files:[file]})){
          navigator.share({files:[file], title: "気分スタンプ帳のバックアップ"}).catch(function(){});
          return;
        }
      }catch(e){ /* fall through to download link */ }
    }

    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
  }

  function importDataFromFile(file){
    var reader = new FileReader();
    reader.onload = function(evt){
      var added = 0;
      try{
        var data = JSON.parse(evt.target.result);
        var incoming = data.stamps || [];
        var existingIds = {};
        state.stamps.forEach(function(s){ existingIds[s.id] = true; });
        incoming.forEach(function(s){
          if(s && s.id && s.type && s.ts && !existingIds[s.id]){
            state.stamps.push({id:s.id, type:s.type, ts:s.ts});
            existingIds[s.id] = true;
            added++;
          }
        });
        saveData();
        renderAll();
        window.alert(added + "件のスタンプを読み込みました。");
      }catch(err){
        window.alert("読み込みに失敗しました。ファイルの内容を確認してください。");
      }
    };
    reader.readAsText(file);
  }

  function renderAll(){
    var dayMap = groupByDay();
    renderTopDate();
    renderHome(dayMap);
    renderBook();
    renderCalendar(dayMap);
    renderStats(dayMap);
    if(state.modalDate) renderModal();
  }

  function switchScreen(name){
    document.querySelectorAll(".screen").forEach(function(s){ s.classList.remove("active"); });
    document.getElementById("screen-"+name).classList.add("active");
    document.querySelectorAll(".nav-btn").forEach(function(b){
      b.classList.toggle("active", b.getAttribute("data-screen")===name);
    });
  }

  document.querySelectorAll(".nav-btn").forEach(function(btn){
    btn.addEventListener("click", function(){
      switchScreen(btn.getAttribute("data-screen"));
    });
  });

  document.querySelectorAll(".add-card .stamp-btn").forEach(function(btn){
    btn.addEventListener("click", function(){
      addStamp(btn.getAttribute("data-type"), state.selectedDate);
    });
  });

  document.getElementById("undoBtn").addEventListener("click", undoLast);

  document.getElementById("addDate").addEventListener("change", function(e){
    state.selectedDate = e.target.value || todayKey();
    renderHome(groupByDay());
  });

  document.getElementById("resetToday").addEventListener("click", function(){
    state.selectedDate = todayKey();
    document.getElementById("addDate").value = state.selectedDate;
    renderHome(groupByDay());
  });

  document.getElementById("bookPrev").addEventListener("click", function(){
    state.bookPage--;
    renderBook();
  });
  document.getElementById("bookNext").addEventListener("click", function(){
    state.bookPage++;
    renderBook();
  });

  document.getElementById("prevMonth").addEventListener("click", function(){
    state.calMonth--;
    if(state.calMonth < 0){ state.calMonth = 11; state.calYear--; }
    renderCalendar(groupByDay());
  });
  document.getElementById("nextMonth").addEventListener("click", function(){
    state.calMonth++;
    if(state.calMonth > 11){ state.calMonth = 0; state.calYear++; }
    renderCalendar(groupByDay());
  });

  document.getElementById("modalClose").addEventListener("click", closeModal);
  document.getElementById("dayModal").addEventListener("click", function(e){
    if(e.target.id === "dayModal") closeModal();
  });
  document.getElementById("modalAddGold").addEventListener("click", function(){
    addStamp("gold", state.modalDate);
  });
  document.getElementById("modalAddGray").addEventListener("click", function(){
    addStamp("gray", state.modalDate);
  });

  document.getElementById("exportBtn").addEventListener("click", exportData);
  document.getElementById("importBtn").addEventListener("click", function(){
    document.getElementById("importFile").click();
  });
  document.getElementById("importFile").addEventListener("change", function(e){
    var file = e.target.files[0];
    if(file) importDataFromFile(file);
    e.target.value = "";
  });

  // init
  var now = new Date();
  state.calYear = now.getFullYear();
  state.calMonth = now.getMonth();
  state.selectedDate = todayKey();
  var addDateInput = document.getElementById("addDate");
  addDateInput.max = todayKey();
  addDateInput.value = state.selectedDate;
  loadData();
  renderAll();
})();
</script>
</body>
</html>
